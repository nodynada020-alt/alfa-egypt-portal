<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AlfaEgy Portal</title>
    <link rel="shortcut icon" href="assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link href="plugins.bundle.css" rel="stylesheet" type="text/css">
    <link href="https://portal.alfaegy.com/backend/css/style.bundle.css?v=1" rel="stylesheet" type="text/css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body id="kt_body" class="app-blank bgi-size-cover bgi-attachment-fixed bgi-position-center bgi-no-repeat">
    <div class="d-flex flex-column flex-root" id="kt_app_root">
        <div class="d-flex flex-column justify-content-center align-items-center flex-lg-row" style="margin-top: 11rem">
            <div class="bg-body d-flex rounded-4 w-md-500px p-xl-20 p-10 pb-xl-5 pb-3 pt-xl-5 pt-3" style="border:1px solid #ddd">
                <form class="form w-100" id="forgotPasswordForm" action="#" method="post">
                    <a href="index.html">
                        <img src="assets/logo.png" class="img-fluid w-150px mx-auto d-block mb-5" alt="">
                    </a>

                    <div class="text-center mb-5">
                        <h1 class="text-dark fw-bolder mb-3">Forgot Password ?</h1>
                        <div class="text-gray-500 fw-semibold fs-6">Enter your email to receive a reset code</div>
                    </div>

                    <div id="emailStep">
                        <div class="fv-row mb-8">
                            <input type="email" placeholder="Email" required name="email" value="Omar.Hamalwy@gmail.com" autocomplete="off" class="form-control bg-transparent">
                        </div>
                    </div>

                    <div id="resetStep" style="display:none">
                        <div class="fv-row mb-5">
                            <input type="text" placeholder="Reset code" name="code" inputmode="numeric" maxlength="6" autocomplete="off" class="form-control bg-transparent">
                        </div>
                        <div class="fv-row mb-5">
                            <input type="password" placeholder="New password" name="password" autocomplete="new-password" class="form-control bg-transparent">
                        </div>
                        <div class="fv-row mb-8">
                            <input type="password" placeholder="Confirm new password" name="password_confirmation" autocomplete="new-password" class="form-control bg-transparent">
                        </div>
                    </div>

                    <div class="d-grid mb-5">
                        <button type="submit" id="resetSubmit" class="btn btn-sm btn-primary">
                            <span class="indicator-label">Send Code</span>
                        </button>
                    </div>

                    <div class="text-center mb-5">
                        <a href="index.html" class="link-primary">Back to login</a>
                    </div>

                    <div id="resetNotice" class="text-center fw-semibold fs-6" style="display:none;color:#24a148"></div>
                </form>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script src="forgot-password.js"></script>
</body>
</html>
