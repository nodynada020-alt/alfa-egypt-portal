<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ALFA Egypt Verification</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            font-family: Arial, sans-serif;
            color: #13233f;
        }
        .verify-card {
            width: min(680px, calc(100% - 32px));
            text-align: center;
        }
        .verify-card img {
            width: 260px;
            max-width: 70%;
            margin-bottom: 38px;
        }
        .message {
            border: 1px solid #d8d8d8;
            border-radius: 18px;
            padding: 34px 24px;
            font-size: clamp(28px, 6vw, 48px);
            line-height: 1.25;
            font-weight: 800;
            color: #24a148;
        }
        .details {
            margin-top: 22px;
            color: #5e6278;
            font-size: 18px;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <main class="verify-card">
        <img src="assets/logo.png" alt="ALFA Egypt">
        <div class="message" id="message">This Report is valid</div>
        <div class="details" id="details"></div>
    </main>
    <script src="local-data.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const type = params.get("type") || "report";
        const code = params.get("code") || "";
        const data = (window.ALFA_ORIGINAL_DATA && window.ALFA_ORIGINAL_DATA[type]) || [];
        const record = data.find((item) => String(item.code || item.id) === String(code));
        const message = document.getElementById("message");
        const details = document.getElementById("details");

        if (record || code) {
            message.textContent = `This ${type === "certificate" ? "Certificate" : "Report"} is valid with code: ${code}`;
            details.innerHTML = [
                record && (record.client || record.project || record.title),
                record && (record.report || record.tested_item),
                record && (record.created_at || record.date)
            ].filter(Boolean).join("<br>");
        } else {
            message.textContent = "Verification code is missing";
            message.style.color = "#d9364f";
        }
    </script>
</body>
</html>
