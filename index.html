<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AlfaEgy Portal</title>
    <link rel="shortcut icon" href="assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <link href="plugins.bundle.css" rel="stylesheet" type="text/css">
    <link href="https://portal.alfaegy.com/backend/css/style.bundle.css?v=1" rel="stylesheet" type="text/css">
    <link href="https://portal.alfaegy.com/backend/plugins/custom/prismjs/prismjs.bundle.css" rel="stylesheet" type="text/css">
    <link href="https://portal.alfaegy.com/backend/plugins/custom/fullcalendar/fullcalendar.bundle.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
    <link rel="preload" as="style" href="https://portal.alfaegy.com/build/assets/app-e238e492.css">
    <link rel="stylesheet" href="https://portal.alfaegy.com/build/assets/app-e238e492.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body id="kt_body" class="app-blank bgi-size-cover bgi-attachment-fixed bgi-position-center bgi-no-repeat">
    <div class="d-flex flex-column flex-root" id="kt_app_root">
        <div class="d-flex flex-column justify-content-center align-items-center flex-lg-row" style="margin-top: 11rem">
            <div class="bg-body d-flex rounded-4 w-md-500px p-xl-20 p-10 pb-xl-5 pb-3 pt-xl-5 pt-3" style="border:1px solid #ddd">
                <form class="form w-100" id="loginForm" action="dashboard.html" method="get">
                    <a href="#">
                        <img src="assets/logo.png" class="img-fluid w-150px mx-auto d-block mb-5" alt="">
                    </a>

                    <div class="text-center mb-5">
                        <h1 class="text-dark fw-bolder mb-3">Login to your account</h1>
                        <div class="text-gray-500 fw-semibold fs-6">Admin Panel</div>
                    </div>

                    <div class="fv-row mb-8">
                        <input type="text" placeholder="Username" required value="" name="username" autocomplete="username" autocapitalize="none" spellcheck="false" class="form-control bg-transparent">
                    </div>

                    <div class="fv-row mb-3">
                        <input type="password" placeholder="Password" required name="password" autocomplete="current-password" autocapitalize="none" spellcheck="false" class="form-control bg-transparent">
                    </div>

                    <div class="d-flex flex-stack flex-wrap gap-3 fs-base fw-semibold mb-8">
                        <div></div>
                        <a href="forgot-password.html" class="link-primary">Forgot Password ?</a>
                    </div>

                    <div class="d-grid mb-10">
                        <button type="submit" class="btn btn-sm btn-primary">
                            <span class="indicator-label">Sign In</span>
                            <span class="indicator-progress">Please wait...
                                <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
                            </span>
                        </button>
                    </div>
                    <div id="loginNotice" class="text-center fw-semibold fs-6" style="display:none;color:#d9214e"></div>
                </form>
            </div>
        </div>
    </div>
<script src="auth.js"></script>
<script>
    document.getElementById("loginForm").addEventListener("submit", function (event) {
        event.preventDefault();
        const formData = Object.fromEntries(new FormData(event.currentTarget).entries());
        const notice = document.getElementById("loginNotice");
        if (window.ALFA_AUTH.validate(formData.username, formData.password)) {
            window.location.href = "dashboard.html";
            return;
        }
        notice.textContent = "Invalid username or password.";
        notice.style.display = "block";
    });
</script>
</body>
</html>
